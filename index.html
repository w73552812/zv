<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZV - ВКонтакте Style</title>
    <style>
        :root {
            --bg: #ebedf0; --card: #ffffff; --text: #000000;
            --accent: #0077ff; --btn-hover: #0066dd; --secondary-text: #818c99;
        }
        /* Темная тема */
        body.dark {
            --bg: #19191a; --card: #222222; --text: #e1e3e6;
            --secondary-text: #76787a;
        }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; transition: 0.3s; }
        .nav { background: var(--card); padding: 10px; display: flex; justify-content: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 0 rgba(0,0,0,0.1); }
        .header-content { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        
        .hidden { display: none !important; }
        input, textarea { width: 100%; background: var(--bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 500; }
        .btn-vk { background: var(--accent); color: white; }
        
        /* Профиль */
        .profile-header { display: flex; gap: 20px; align-items: center; }
        .avatar-lg { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        
        /* Лайки */
        .like-btn { background: #f0f2f5; color: #444; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        body.dark .like-btn { background: #333; color: #ccc; }
        .like-btn.active { color: #ff3347; background: #ffebed; }
        
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar-sm { width: 40px; height: 40px; border-radius: 50%; }
    </style>
</head>
<body class="dark"> <div class="nav">
        <div class="header-content">
            <b style="font-size: 20px;">ZV</b>
            <div>
                <button onclick="document.body.classList.toggle('dark')" class="btn">🌓 Тема</button>
                <button id="logoutBtn" class="btn hidden">Выйти</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="authBlock" class="card">
            <h3>Вход в ZV</h3>
            <input type="email" id="email" placeholder="Email"><br><br>
            <input type="password" id="password" placeholder="Пароль"><br><br>
            <button id="loginBtn" class="btn btn-vk">Войти</button>
            <button id="regBtn" class="btn">Регистрация</button>
        </div>

        <div id="profileBlock" class="card hidden">
            <div class="profile-header">
                <img id="myAvatar" class="avatar-lg" src="https://via.placeholder.com/100">
                <div>
                    <h2 id="myName" style="margin:0;">Загрузка...</h2>
                    <input type="file" id="uploadAvatar" style="margin-top:10px; font-size:12px;">
                </div>
            </div>
        </div>

        <div id="createPostBlock" class="card hidden">
            <textarea id="postText" placeholder="Что у вас нового?"></textarea>
            <button id="submitBtn" class="btn btn-vk" style="margin-top:10px; width:100%;">Опубликовать</button>
        </div>

        <div id="feed"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
